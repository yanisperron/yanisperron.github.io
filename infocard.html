<!DOCTYPE html>
<html>
<head>
    <title>Info Card</title>
</head>
<body>
    <div id="name">Nom non défini</div>
    <div id="description">Description non fournie</div>

    <script>
        // Récupérer les paramètres de l'URL
        const urlParams = new URLSearchParams(window.location.search);
        
        // Extraire les valeurs des paramètres
        const name = urlParams.get('name');
        const description = urlParams.get('description');
        
        // Mettre à jour le contenu des éléments avec les valeurs extraites
        document.getElementById('name').textContent = name || 'Nom non défini';
        document.getElementById('description').textContent = description || 'Description non fournie';
    </script>
</body>
</html>
