<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Information du Point</title>
</head>
<body>
  <h1>Détails du Point</h1>

  <p><strong>Nom :</strong> <span id="name"></span></p>
  <p><strong>Description :</strong> <span id="description"></span></p>

  <script>
// Récupérer les paramètres de l'URL
const urlParams = new URLSearchParams(window.location.search);

// Initialiser des variables pour stocker les valeurs
let name, description;

// Parcourir les paramètres et stocker les valeurs
urlParams.forEach((value, key) => {
    if (key === 'name') {
        name = value;
    } else if (key === 'description') {
        description = value;
    }
  });

    // Afficher les valeurs pour vérification
console.log('Name:', name);
console.log('Description:', description);
    
    // Afficher les valeurs dans les éléments correspondants
    document.getElementById('name').textContent = name || 'Nom non défini';
    document.getElementById('description').textContent = description || 'Description non fournie';
  </script>
</body>
</html>
